<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD PRINCE | Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #ef4444;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; min-height: 100vh; padding: 10px; }
        
        .main-card {
            width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 35px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative;
        }

        /* Profile Header */
        .header-top { height: 180px; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); position: relative; }
        .profile-container { text-align: center; margin-top: -90px; padding: 0 20px; position: relative; z-index: 2; }
        .profile-img { 
            width: 160px; height: 160px; border-radius: 50%; border: 7px solid white;
            object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.15); background: #eee;
        }
        .blood-badge {
            position: absolute; top: 120px; right: 32%; background: var(--accent);
            color: white; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
            border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .user-meta { margin-top: 15px; }
        .user-meta h1 { font-size: 28px; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .user-meta p { font-size: 16px; color: var(--secondary); font-weight: 600; margin-bottom: 5px; }

        /* Quick Action Buttons */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 25px 20px; }
        .btn-main {
            padding: 14px; border-radius: 16px; text-decoration: none; font-weight: 700;
            font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.3s;
        }
        .btn-call { background: var(--secondary); color: white; }
        .btn-save { background: #e2e8f0; color: var(--primary); }
        .btn-main:hover { transform: translateY(-3px); opacity: 0.9; }

        /* Links Grid */
        .content-section { padding: 0 20px 30px; }
        .section-label { 
            font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; 
            letter-spacing: 2px; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px;
        }
        .section-label::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
        
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .social-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .social-item i { 
            width: 55px; height: 55px; border-radius: 18px; display: flex; 
            align-items: center; justify-content: center; font-size: 24px; color: white;
            transition: 0.3s; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .social-item:hover i { transform: scale(1.1); box-shadow: 0 12px 20px rgba(0,0,0,0.15); }
        .social-item span { font-size: 11px; color: #475569; font-weight: 600; }

        /* Brand Colors */
        .bg-fb { background: #1877F2; } .bg-li { background: #0077B5; } .bg-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .bg-yt { background: #FF0000; } .bg-wa { background: #25D366; } .bg-tg { background: #26A5E4; }
        .bg-tk { background: #000000; } .bg-x { background: #000000; } .bg-th { background: #000000; }
        .bg-vb { background: #7360f2; } .bg-hp { background: #ff5722; } .bg-cv { background: #2ecc71; }

        /* Info Cards */
        .detail-card { 
            background: #f8fafc; padding: 18px; border-radius: 20px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 15px; border: 1px solid #e2e8f0;
        }
        .detail-card i { font-size: 20px; color: var(--secondary); width: 25px; text-align: center; }
        .detail-text strong { display: block; font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
        .detail-text p { font-size: 14px; color: var(--primary); line-height: 1.4; font-weight: 500; }

        /* Payment Section */
        .payment-box {
            background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            padding: 20px; border-radius: 20px; border: 2px dashed #cbd5e1; text-align: center;
        }
        .payment-box strong { color: #64748b; font-size: 12px; display: block; margin-bottom: 8px; }
        .pay-number { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }

        .footer { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 12px; font-weight: 500; }
    </style>
</head>
